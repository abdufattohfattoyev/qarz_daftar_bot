version: '3.9'

services:

  db:
    image: postgres:16-alpine
    container_name: qarz_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qarz_user -d qarz_daftar"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: qarz_redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nasiya_backend
    restart: always
    env_file:
      - .env
    volumes:
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"
    networks:
      - internal
      - nasiya-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nasiya_frontend
    restart: always
    depends_on:
      - backend
    networks:
      - internal
      - nasiya-network

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: nasiya_bot
    restart: always
    env_file:
      - .env
    depends_on:
      - backend
    networks:
      - internal

  # Muddati o'tgan qarzlar uchun har 24 soatda eslatma yuboradi
  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nasiya_scheduler
    restart: always
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "while true; do
               python manage.py send_reminders || true;
               sleep 86400;
             done"
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:

networks:
  internal:
    driver: bridge
  nasiya-network:
    external: true
